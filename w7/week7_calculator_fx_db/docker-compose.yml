services:
  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: calc_data
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    # Build locally: docker build -t roberto/sum-product_fx .
    # Push:          docker push roberto/sum-product_fx:latest
    # Then replace 'build: .' with 'image: roberto/sum-product_fx:latest'
    build: .
    image: roberto/sum-product_fx:latest
    container_name: calculator-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      # make sure your DB_USER name is correct mine is root
      DB_USER: root
      # make sure your DB_PASSWORD is correct mine is root
      DB_PASSWORD: Test12
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
#    network_mode: bridge # it cancels network of docker -> docker cannot find host db.
volumes:
  db_data:

#  Then execute docker compose up --build
